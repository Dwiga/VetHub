name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Create deployment archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='*/node_modules' \
            --exclude='*/dist' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='artifacts/mockup-sandbox' \
            --exclude='.local' \
            --exclude='.config' \
            --exclude='.cache' \
            --exclude='attached_assets' \
            --exclude='.canvas' \
            --exclude='*.log' \
            -czf /tmp/vetcare-deploy.tar.gz \
            .
          echo "Archive size: $(du -sh /tmp/vetcare-deploy.tar.gz | cut -f1)"

      - name: Upload archive to VPS
        run: |
          scp /tmp/vetcare-deploy.tar.gz \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/vetcare-deploy.tar.gz

      - name: Extract, rebuild, and restart on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s << 'ENDSSH'
            set -euo pipefail
            REMOTE_DIR="/home/ubuntu/vetcare-pro"

            echo "→ Extracting..."
            mkdir -p "$REMOTE_DIR"
            tar -xzf /tmp/vetcare-deploy.tar.gz -C "$REMOTE_DIR"
            rm -f /tmp/vetcare-deploy.tar.gz

            echo "→ Rebuilding containers..."
            cd "$REMOTE_DIR"
            sudo docker compose up --build -d --remove-orphans

            echo "→ Waiting for services to be healthy..."
            sleep 8
            sudo docker compose ps

            echo "✓ Deploy complete"
          ENDSSH
