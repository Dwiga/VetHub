name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_HOST: ${{ secrets.VPS_HOST }}
  DEPLOY_DIR: /var/www/pethub

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd frontend
          bun install --frozen-lockfile

      - name: Generate Prisma client
        run: |
          cd frontend
          DATABASE_URL="${{ secrets.DATABASE_URL }}" bunx prisma generate

      - name: Build
        run: |
          cd frontend
          VITE_CLERK_PUBLISHABLE_KEY="${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}" \
          bun run build

      - name: Set up SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Ensure permissions on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            sudo mkdir -p /var/www/pethub
            sudo chown -R $USER:$USER /var/www/pethub
            # Ensure bun binary is globally accessible (copy, not symlink — ProtectHome blocks symlinks)
            if [ ! -f /usr/local/bin/bun ]; then
              sudo cp "$HOME/.bun/bin/bun" /usr/local/bin/bun
              sudo chmod 755 /usr/local/bin/bun
            fi

      - name: Rsync built files to VPS
        run: |
          set -euo pipefail
          DEST="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/pethub"

          echo "→ Rsyncing dist/..."
          rsync -az --delete frontend/dist/ "$DEST/dist/"

          echo "→ Rsyncing prisma/..."
          rsync -az --delete frontend/prisma/ "$DEST/prisma/"

          echo "→ Rsyncing server.ts + package files..."
          rsync -az \
            frontend/server.ts \
            frontend/package.json \
            frontend/bun.lock \
            frontend/prisma.config.ts \
            "$DEST/"

          echo "→ Rsyncing deployment configs..."
          rsync -az --delete deployment/ "$DEST/deployment/"

      - name: Post-deploy — restart services
        uses: appleboy/ssh-action@v1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          envs: DATABASE_URL,CLERK_SECRET_KEY,CLERK_PUBLISHABLE_KEY,VITE_CLERK_PUBLISHABLE_KEY,SESSION_SECRET
          script: |
            set -euo pipefail
            cd /var/www/pethub

            # Bun installs to ~/.bun/bin/ — not in PATH for non-interactive SSH
            export BUN_PATH="$HOME/.bun/bin"
            export PATH="$BUN_PATH:$PATH"

            # Write .env.production from GitHub secrets
            echo "→ Writing .env.production..."
            printf '%s\n' \
              "NODE_ENV=production" \
              "PORT=3000" \
              "HOST=0.0.0.0" \
              "DATABASE_URL=$DATABASE_URL" \
              "CLERK_SECRET_KEY=$CLERK_SECRET_KEY" \
              "CLERK_PUBLISHABLE_KEY=$CLERK_PUBLISHABLE_KEY" \
              "VITE_CLERK_PUBLISHABLE_KEY=$VITE_CLERK_PUBLISHABLE_KEY" \
              "SESSION_SECRET=$SESSION_SECRET" \
              > .env.production

            # Pass DATABASE_URL into Prisma
            export DATABASE_URL="$DATABASE_URL"

            echo "→ Installing production dependencies..."
            bun install --production --frozen-lockfile

            echo "→ Generating Prisma client..."
            bunx prisma generate

            echo "→ Running database migrations..."
            bunx prisma migrate deploy

            echo "→ Installing systemd service (if not yet installed)..."
            if [ ! -f /etc/systemd/system/pethub.service ]; then
              sudo cp deployment/systemd/pethub.service /etc/systemd/system/pethub.service
              sudo systemctl daemon-reload
              sudo systemctl enable pethub
            fi

            echo "→ Installing Caddyfile..."
            if [ -f deployment/caddy/Caddyfile ]; then
              sudo cp deployment/caddy/Caddyfile /etc/caddy/Caddyfile
              sudo systemctl reload caddy 2>/dev/null || sudo systemctl restart caddy
            fi

            echo "→ Restarting app..."
            sudo systemctl daemon-reload
            sudo systemctl restart pethub

            echo "→ Waiting for service..."
            sleep 5

            echo "→ Health check..."
            curl -fsS --max-time 5 http://localhost:3000/api/health || {
              echo "✗ Health check failed!"
              echo "  Logs:"
              sudo journalctl -u pethub --no-pager -n 30
              exit 1
            }

            echo "✓ Deploy complete"
