name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_HOST: ${{ secrets.VPS_HOST }}
  DEPLOY_DIR: /var/www/vethub

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd frontend
          bun install --frozen-lockfile

      - name: Generate Prisma client
        run: |
          cd frontend
          DATABASE_URL="${{ secrets.DATABASE_URL }}" bunx prisma generate

      - name: Build
        run: |
          cd frontend
          VITE_CLERK_PUBLISHABLE_KEY="${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}" \
          bun run build

      - name: Set up SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Rsync built files to VPS
        run: |
          set -euo pipefail
          DEST="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/vethub"

          echo "→ Rsyncing dist/..."
          rsync -az --delete frontend/dist/ "$DEST/dist/"

          echo "→ Rsyncing prisma/..."
          rsync -az --delete frontend/prisma/ "$DEST/prisma/"

          echo "→ Rsyncing server.ts + package files..."
          rsync -az \
            frontend/server.ts \
            frontend/package.json \
            frontend/bun.lock \
            "$DEST/"

          echo "→ Rsyncing deployment configs..."
          rsync -az --delete deployment/ "$DEST/deployment/"

      - name: Post-deploy — restart services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail
            cd /var/www/vethub

            echo "→ Installing production dependencies..."
            bun install --production --frozen-lockfile

            echo "→ Generating Prisma client..."
            bunx prisma generate

            echo "→ Running database migrations..."
            bunx prisma migrate deploy

            echo "→ Installing systemd service (if not yet installed)..."
            if [ ! -f /etc/systemd/system/vethub.service ]; then
              sudo cp deployment/systemd/vethub.service /etc/systemd/system/vethub.service
              sudo systemctl daemon-reload
              sudo systemctl enable vethub
            fi

            echo "→ Installing Caddyfile..."
            if [ -f deployment/caddy/Caddyfile ]; then
              sudo cp deployment/caddy/Caddyfile /etc/caddy/Caddyfile
              sudo systemctl reload caddy 2>/dev/null || sudo systemctl restart caddy
            fi

            echo "→ Restarting app..."
            sudo systemctl daemon-reload
            sudo systemctl restart vethub

            echo "→ Waiting for service..."
            sleep 5

            echo "→ Health check..."
            curl -fsS --max-time 5 http://localhost:3000/api/health || {
              echo "✗ Health check failed!"
              echo "  Logs:"
              sudo journalctl -u vethub --no-pager -n 30
              exit 1
            }

            echo "✓ Deploy complete"
