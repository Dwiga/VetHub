# ──────────────────────────────────────────────────────────────────────────────
# VetCare Pro — nginx reverse proxy
#
# Sits in front of the Bun/TanStack Start container. Responsibilities:
#   • TLS termination (mount certs at /etc/nginx/certs and uncomment the 443
#     server block).
#   • Long-term caching for hashed assets under /assets/*.
#   • Gzip + sane proxy timeouts + websocket upgrade (Clerk needs none today,
#     but TanStack Start may stream SSE in future).
#
# The app already serves /assets/* and SSR itself, so nginx here is purely an
# edge layer. You can scale `app` horizontally and add `upstream` members.
# ──────────────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" rt=$request_time';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens off;

  client_max_body_size 10m;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

  # Upstream — the Bun app inside the compose network.
  upstream vetcare_app {
    server app:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # ── HTTP (port 80) ─────────────────────────────────────────────────────────
  # In production, redirect to HTTPS and uncomment the TLS server block below.
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ACME / Let's Encrypt webroot challenge (when using certbot).
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Comment out the next two lines if you DON'T want auto-redirect to HTTPS.
    # return 301 https://$host$request_uri;

    # Long-cache hashed assets.
    location /assets/ {
      proxy_pass http://vetcare_app;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;

      # Override upstream cache headers — these filenames are content-hashed.
      proxy_hide_header Cache-Control;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Everything else (UI + /api) → app.
    location / {
      proxy_pass http://vetcare_app;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Websocket / SSE friendly.
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";

      # Timeouts.
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }
  }

  # ── HTTPS (port 443) ───────────────────────────────────────────────────────
  # Uncomment after you've provisioned certs at /etc/nginx/certs/{fullchain,privkey}.pem
  # server {
  #   listen 443 ssl http2;
  #   listen [::]:443 ssl http2;
  #   server_name vetcare.example.com;
  #
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_prefer_server_ciphers off;
  #   ssl_session_cache shared:SSL:10m;
  #   ssl_session_timeout 10m;
  #
  #   add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  #   add_header X-Content-Type-Options "nosniff" always;
  #   add_header X-Frame-Options "SAMEORIGIN" always;
  #   add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  #
  #   location /assets/ {
  #     proxy_pass http://vetcare_app;
  #     proxy_set_header Host              $host;
  #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  #     proxy_set_header X-Forwarded-Proto https;
  #     proxy_hide_header Cache-Control;
  #     add_header Cache-Control "public, max-age=31536000, immutable" always;
  #   }
  #
  #   location / {
  #     proxy_pass http://vetcare_app;
  #     proxy_set_header Host              $host;
  #     proxy_set_header X-Real-IP         $remote_addr;
  #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  #     proxy_set_header X-Forwarded-Proto https;
  #     proxy_http_version 1.1;
  #     proxy_set_header Upgrade    $http_upgrade;
  #     proxy_set_header Connection "upgrade";
  #   }
  # }
}
