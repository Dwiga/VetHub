# ─────────────────────────────────────────────────────────────────────────────
# Bun configuration for VetCare Pro
# https://bun.sh/docs/runtime/bunfig
#
# IMPORTANT — package installation:
#   Use `pnpm install`, not `bun install`.
#   This workspace uses pnpm's `catalog:` version protocol and platform-specific
#   package overrides that Bun's installer does not yet support. Once you have
#   run `pnpm install`, you can use `bun run` for everything else.
#
# WHY BUN:
#   Bun is a drop-in Node.js-compatible runtime with faster startup, built-in
#   TypeScript execution, and a smaller Docker footprint (oven/bun:alpine).
#   The production API container uses Bun to run the esbuild bundle.
# ─────────────────────────────────────────────────────────────────────────────

[install]
# Do not generate a bun.lockb — pnpm-lock.yaml is the canonical lockfile.
frozenLockfile = false

[run]
# `bun run <script>` uses Bun's JS runtime instead of Node.js for scripts.
# This gives faster startup for dev servers and build scripts.
bun = true
