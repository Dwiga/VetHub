# ─────────────────────────────────────────────────────────────────────────────
# Bun configuration for VetCare Pro
# https://bun.sh/docs/runtime/bunfig
#
# WHY BUN:
#   Bun is a drop-in Node.js-compatible runtime with faster startup, built-in
#   TypeScript execution, and a smaller Docker footprint (oven/bun:alpine).
#   Both local development and the production API container use Bun.
# ─────────────────────────────────────────────────────────────────────────────

[install]
# bun.lock is the canonical lockfile.
frozenLockfile = false

[run]
# `bun run <script>` uses Bun's JS runtime instead of Node.js for scripts.
# This gives faster startup for dev servers and build scripts.
bun = true
