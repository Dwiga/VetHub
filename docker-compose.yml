services:
  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vetcare
      POSTGRES_USER: vetcare
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetcare -d vetcare"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Express API server ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://vetcare:${POSTGRES_PASSWORD:-changeme}@db:5432/vetcare
      STACK_PROJECT_ID: ${STACK_PROJECT_ID:-your-project-id}
      STACK_PUBLISHABLE_CLIENT_KEY: ${STACK_PUBLISHABLE_CLIENT_KEY:-pck_...}
      STACK_SECRET_SERVER_KEY: ${STACK_SECRET_SERVER_KEY:-ssk_...}
      SESSION_SECRET: replace-with-a-long-random-string
    depends_on:
      db:
        condition: service_healthy

  # ── nginx: serves the frontend and proxies /api to the API server ─────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
      args:
        VITE_STACK_PROJECT_ID: ${STACK_PROJECT_ID:-your-project-id}
        VITE_STACK_PUBLISHABLE_CLIENT_KEY: ${STACK_PUBLISHABLE_CLIENT_KEY:-pck_...}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
