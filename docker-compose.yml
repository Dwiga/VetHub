services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vetcare
      POSTGRES_USER: vetcare
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetcare -d vetcare"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Database Migrator ──────────────────────────────────────────────────────
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: build-api
    environment:
      DATABASE_URL: postgres://vetcare:${POSTGRES_PASSWORD:-changeme}@db:5432/vetcare
    command: ["pnpm", "--filter", "@workspace/db", "run", "push-force"]
    depends_on:
      db:
        condition: service_healthy

  # ── Express API server ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://vetcare:${POSTGRES_PASSWORD:-changeme}@db:5432/vetcare
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_FRONTEND_API_URL: ${CLERK_FRONTEND_API_URL:-}
      SESSION_SECRET: ${SESSION_SECRET}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      migrator:
        condition: service_completed_successfully

  # ── nginx: serves the frontend and proxies /api to the API server ─────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
        VITE_CLERK_PROXY_URL: ${VITE_CLERK_PROXY_URL:-}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"   # Caddy (on host) proxies here; not exposed publicly
    depends_on:
      - api

volumes:
  postgres_data:
