services:
  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vetcare
      POSTGRES_USER: vetcare
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetcare -d vetcare"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Express API server ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://vetcare:${POSTGRES_PASSWORD:-changeme}@db:5432/vetcare
      CLERK_SECRET_KEY: sk_test_FOPRmKS8IvIXTGck96PInlcycqfXB0Qv7BWx8a2gQn
      CLERK_PUBLISHABLE_KEY: pk_test_ZXF1YWwtYWRkZXItOTQuY2xlcmsuYWNjb3VudHMuZGV2JA
      SESSION_SECRET: replace-with-a-long-random-string
    depends_on:
      db:
        condition: service_healthy

  # ── nginx: serves the frontend and proxies /api to the API server ─────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
      args:
        VITE_CLERK_PUBLISHABLE_KEY: pk_test_ZXF1YWwtYWRkZXItOTQuY2xlcmsuYWNjb3VudHMuZGV2JA
        VITE_CLERK_PROXY_URL: ${VITE_CLERK_PROXY_URL:-}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
