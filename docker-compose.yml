# ──────────────────────────────────────────────────────────────────────────────
# VetCare Pro — production compose stack
#
# Three services:
#   • db    — PostgreSQL 16 (volume-backed)
#   • app   — Bun + TanStack Start (SSR + /api + static)
#   • web   — nginx reverse proxy (TLS termination + caching)
#
# Bring it up:
#     cp .env.example .env      # fill in DB password + Clerk keys
#     docker compose up --build -d
#     # First boot only: push the Prisma schema into the empty Postgres DB.
#     docker compose run --rm app bunx prisma db push
#     docker compose run --rm app bun run prisma/seed.ts
#
# Hit it at http://localhost (nginx → app:3000).
# ──────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vetcare
      POSTGRES_USER: vetcare
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5433:5432"   # SSH-tunnel only; not exposed to public internet
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vetcare} -d ${POSTGRES_DB:-vetcare}"]
      interval: 10s
      timeout: 3s
      retries: 10
    # Don't publish 5432 to the host by default — only the `app` service needs it.
    # Uncomment if you want to connect with psql / a GUI from outside Docker.
    # ports:
    #   - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: build-api
    environment:
      DATABASE_URL: postgres://vetcare:${POSTGRES_PASSWORD:-changeme}@db:5433/vetcare
    command: ["pnpm", "--filter", "@workspace/db", "run", "push-force"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://vetcare:${POSTGRES_PASSWORD:-changeme}@db:5433/vetcare
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY:      ${CLERK_SECRET_KEY}
      # If you want the container to push the schema on startup the first time,
      # set RUN_DB_PUSH=1. Disable it afterwards — real migrations belong in CI.
      RUN_DB_PUSH:           ${RUN_DB_PUSH:-}
      RUN_DB_SEED:           ${RUN_DB_SEED:-}
    expose:
      - "3000"
    # If you'd rather skip nginx entirely, publish the port:
    # ports:
    #   - "3000:3000"

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
      # - "443:443"   # uncomment after wiring TLS in nginx.conf
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount your certs here when ready (Let's Encrypt / your CA).
      # - ./nginx/certs:/etc/nginx/certs:ro
      # - ./nginx/www:/var/www/certbot:ro

volumes:
  db_data:
